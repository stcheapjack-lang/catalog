<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catalog Viewer</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #222;
    }

    .topbar {
      height: 64px;
      background: linear-gradient(90deg, #0b3d91, #082d6b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: bold;
      font-size: 20px;
    }

    .logo-section img {
      height: 42px;
      width: auto;
      border-radius: 8px;
      background: #fff;
      padding: 4px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-actions a,
    .top-actions button {
      padding: 10px 16px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .titlebar {
      background: #fff;
      padding: 14px 22px;
      font-size: 20px;
      font-weight: 700;
      border-bottom: 1px solid #e5e8f0;
      color: #0b3d91;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 118px);
      border: none;
      display: block;
      background: #fff;
    }

    @media (max-width: 768px) {
      .topbar {
        height: auto;
        padding: 10px 14px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .logo-section {
        font-size: 18px;
      }

      .logo-section img {
        height: 36px;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-end;
      }

      iframe {
        height: calc(100vh - 150px);
      }

      .titlebar {
        font-size: 18px;
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="logo-section">
      <img src="./images/st-traders-logo.png" alt="Logo" onerror="this.style.display='none'">
      <span>STCHEAPJACK</span>
    </div>

    <div class="top-actions">
      <a href="./index.html">🏠 Home</a>
      <a href="./index.html">⬅ Back</a>
      <button onclick="openWhatsApp()">Enquire</button>
    </div>
  </header>

  <div class="titlebar" id="catalogTitle">Catalog Viewer</div>

  <iframe id="pdfFrame"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const title = params.get("title") || "Catalog Viewer";

    document.getElementById("catalogTitle").textContent = title;

    if (file) {
      document.getElementById("pdfFrame").src = "./catalogs/" + file + "#toolbar=0&navpanes=0&scrollbar=1";
    }

    function openWhatsApp() {
      const msg = encodeURIComponent("Hi, I want enquiry for: " + title);
      window.open("https://wa.me/918686542986?text=" + msg, "_blank");
    }
  </script>

</body>
</html>
