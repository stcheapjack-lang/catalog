<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog Viewer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f7fb;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.topbar{
  background:#0b3d91;
  color:#fff;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.logo-section{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:20px;
}

.logo-section img{
  height:40px;
  background:#fff;
  padding:4px;
  border-radius:8px;
}

.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.top-actions a,
.top-actions button{
  background:rgba(255,255,255,.15);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  cursor:pointer;
  font-weight:600;
}

/* MOBILE MENU */
.menu-toggle{
  display:none;
  border:none;
  background:#fff;
  padding:14px;
  font-weight:bold;
  color:#0b3d91;
  cursor:pointer;
  border-bottom:1px solid #ddd;
}

/* LAYOUT */
.layout{
  flex:1;
  display:flex;
  min-height:0;
}

/* SIDEBAR */
.sidebar{
  width:290px;
  background:#fff;
  border-right:1px solid #ddd;
  overflow-y:auto;
  padding:15px;
}

.sidebar h3{
  color:#0b3d91;
  margin-bottom:10px;
}

.sidebar input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:10px;
  margin-bottom:12px;
}

.sidebar ul{
  list-style:none;
}

.sidebar li{
  margin-bottom:6px;
}

.sidebar a{
  display:block;
  padding:10px;
  border-radius:10px;
  text-decoration:none;
  color:#333;
}

.sidebar a:hover{
  background:#eef4ff;
}

.sidebar a.active-link{
  background:#0b3d91;
  color:#fff;
}

/* MAIN */
.viewer-content{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}

.titlebar{
  background:#fff;
  padding:14px 18px;
  font-size:20px;
  font-weight:bold;
  color:#0b3d91;
  border-bottom:1px solid #ddd;
}

.pdf-wrap{
  flex:1;
  overflow-y:auto;
  padding:15px;
  position:relative;
}

/* PAGE NUMBER */
.page-indicator{
  position:sticky;
  top:10px;
  margin-left:auto;
  width:max-content;
  background:#0b3d91;
  color:#fff;
  padding:8px 14px;
  border-radius:30px;
  font-size:14px;
  font-weight:bold;
  z-index:20;
  margin-bottom:10px;
}

.page{
  background:#fff;
  margin:0 auto 18px;
  padding:8px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
  width:max-content;
  max-width:100%;
}

.page canvas{
  display:block;
  max-width:100%;
  height:auto;
  border-radius:10px;
}

.status{
  text-align:center;
  padding:20px;
  color:#555;
  font-weight:600;
}

/* MOBILE */
@media(max-width:900px){
  .menu-toggle{
    display:block;
  }

  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    display:none;
    max-height:320px;
    border-right:none;
    border-bottom:1px solid #ddd;
  }

  .sidebar.show{
    display:block;
  }
}

@media(max-width:600px){
  .logo-section{
    font-size:18px;
  }

  .logo-section img{
    height:34px;
  }

  .top-actions{
    width:100%;
    justify-content:flex-end;
  }

  .top-actions a,
  .top-actions button{
    padding:9px 12px;
    font-size:13px;
  }

  .titlebar{
    font-size:18px;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo-section">
    <img src="./images/st-traders-logo1.png" onerror="this.style.display='none'">
    <span>ST TRADERS CHEAPJACK</span>
  </div>

  <div class="top-actions">
    <a href="./index.html">🏠 Home</a>
    <button onclick="sharePage()">🔗 Share</button>
    <button onclick="openWhatsApp()">WhatsApp</button>
  </div>
</header>

<button class="menu-toggle" id="menuToggle">☰ Catalog List</button>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <h3>Catalog List</h3>
    <input type="text" id="catalogSearch" placeholder="Search catalog...">

    <ul id="catalogList">
      <li><a href="./viewer.html?file=aprons.pdf&title=Aprons">Aprons</a></li>
      <li><a href="./viewer.html?file=attender-gown.pdf&title=Attender Gown">Attender Gown</a></li>
      <li><a href="./viewer.html?file=bedsheets-catalog.pdf&title=Bedsheets Catalog">Bedsheets Catalog</a></li>
      <li><a href="./viewer.html?file=blankets-catalog.pdf&title=Blankets Catalog">Blankets Catalog</a></li>
      <li><a href="./viewer.html?file=patient-dress.pdf&title=Patient Dress">Patient Dress</a></li>
      <li><a href="./viewer.html?file=patient-gowns-r.pdf&title=Patient Gowns R">Patient Gowns R</a></li>
      <li><a href="./viewer.html?file=scrub-suit-female-victoria-supreme.pdf&title=Scrub Suit Female">Scrub Suit Female</a></li>
      <li><a href="./viewer.html?file=scrub-suit-male-victoria-supreme.pdf&title=Scrub Suit Male">Scrub Suit Male</a></li>
      <li><a href="./viewer.html?file=nurse-uniform.pdf&title=Nurse Uniform">Nurse Uniform</a></li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="viewer-content">
    <div class="titlebar" id="catalogTitle">Catalog Viewer</div>

    <div class="pdf-wrap" id="pdfWrap">
      <div class="page-indicator" id="pageIndicator">Page 1 of 1</div>
      <div class="status" id="status">Loading catalog...</div>
    </div>
  </main>

</div>

<script src="./pdfjs/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = './pdfjs/pdf.worker.min.js';

const params = new URLSearchParams(window.location.search);
const file = params.get("file");
const title = params.get("title") || "Catalog Viewer";

const catalogTitle = document.getElementById("catalogTitle");
const pdfWrap = document.getElementById("pdfWrap");
const statusEl = document.getElementById("status");
const pageIndicator = document.getElementById("pageIndicator");

const sidebar = document.getElementById("sidebar");
const menuToggle = document.getElementById("menuToggle");
const sidebarLinks = document.querySelectorAll("#catalogList a");
const catalogSearch = document.getElementById("catalogSearch");

catalogTitle.textContent = title;

/* PDF RENDER */
async function renderPDF(){
  if(!file){
    statusEl.textContent="No catalog selected.";
    return;
  }

  try{
    const pdf = await pdfjsLib.getDocument("./catalogs/" + file).promise;
    const totalPages = pdf.numPages;

    statusEl.remove();

    const width = Math.min(pdfWrap.clientWidth - 30, 1000);

    for(let pageNum=1; pageNum<=totalPages; pageNum++){
      const page = await pdf.getPage(pageNum);

      const viewport = page.getViewport({scale:1});
      const scale = width / viewport.width;
      const scaledViewport = page.getViewport({scale});

      const pageDiv = document.createElement("div");
      pageDiv.className = "page";
      pageDiv.dataset.page = pageNum;

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const ratio = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = scaledViewport.width * ratio;
      canvas.height = scaledViewport.height * ratio;

      canvas.style.width = scaledViewport.width + "px";
      canvas.style.height = scaledViewport.height + "px";

      await page.render({
        canvasContext: ctx,
        viewport: scaledViewport,
        transform:[ratio,0,0,ratio,0,0]
      }).promise;

      pageDiv.appendChild(canvas);
      pdfWrap.appendChild(pageDiv);
    }

    pdfWrap.addEventListener("scroll",()=>{
      const pages = document.querySelectorAll(".page");
      let current = 1;

      pages.forEach(p=>{
        const rect = p.getBoundingClientRect();
        const wrap = pdfWrap.getBoundingClientRect();

        if(rect.top - wrap.top <= 120){
          current = p.dataset.page;
        }
      });

      pageIndicator.textContent = "Page " + current + " of " + totalPages;
    });

  }catch(err){
    console.error(err);
    statusEl.textContent = "Unable to load catalog.";
  }
}

renderPDF();

/* SEARCH */
catalogSearch.addEventListener("input",function(){
  const val = this.value.toLowerCase();

  sidebarLinks.forEach(link=>{
    link.parentElement.style.display =
      link.textContent.toLowerCase().includes(val)
      ? "block" : "none";
  });
});

/* ACTIVE LINK */
const currentUrl = location.href;
sidebarLinks.forEach(link=>{
  if(currentUrl.includes(link.getAttribute("href"))){
    link.classList.add("active-link");
  }
});

/* MOBILE MENU */
menuToggle.addEventListener("click",()=>{
  sidebar.classList.toggle("show");
});

/* SHARE */
function sharePage(){
  const url = location.href;

  if(navigator.share){
    navigator.share({
      title:title,
      text:"Check this catalog",
      url:url
    });
  }else{
    navigator.clipboard.writeText(url);
    alert("Link copied!");
  }
}

/* WHATSAPP */
function openWhatsApp(){
  const msg = encodeURIComponent("Hi, I want enquiry for: " + title);
  window.open("https://wa.me/919347012962?text=" + msg,"_blank");
}
</script>

</body>
</html>
