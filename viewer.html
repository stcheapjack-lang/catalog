<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catalog Viewer</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b3d91;
      color: #fff;
      padding: 10px 20px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }

    .logo-section img {
      height: 38px;
      border-radius: 6px;
    }

    .top-actions a,
    .top-actions button {
      margin-left: 10px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .titlebar {
      background: #fff;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 110px);
      border: none;
      display: block;
      background: #fff;
    }

    @media(max-width:768px){
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      iframe {
        height: calc(100vh - 145px);
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="logo-section">
      <img src="./images/st-traders-logo.png" alt="Logo">
      <span>STCHEAPJACK</span>
    </div>

    <div class="top-actions">
      <a href="./index.html">🏠 Home</a>
      <a href="./index.html">⬅ Back</a>
      <button onclick="openWhatsApp()">Enquire</button>
    </div>
  </header>

  <div class="titlebar" id="catalogTitle">Catalog Viewer</div>

  <iframe id="pdfFrame"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const title = params.get("title") || "Catalog Viewer";

    document.getElementById("catalogTitle").textContent = title;

    if (file) {
      document.getElementById("pdfFrame").src = "./catalogs/" + file + "#toolbar=0&navpanes=0&scrollbar=1";
    }

    function openWhatsApp() {
      const msg = encodeURIComponent("Hi, I want enquiry for: " + title);
      window.open("https://wa.me/918686542986?text=" + msg, "_blank");
    }
  </script>

</body>
</html>
